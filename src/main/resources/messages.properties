# ─────────────────────────────────────────────────────────────────────────────
# PAYROLL — VALIDATION & BUSINESS RULE MESSAGES
# ─────────────────────────────────────────────────────────────────────────────

# Thrown when the requested payroll record does not exist in the system
payroll.not.found=Payroll not found with ID: {0}.

# Thrown when a payroll already exists for the same employee, month, and year
payroll.already.exists=Payroll already exists for month {0} and year {1} for this employee.

# Thrown when attempting to generate payroll for an employee who is not ACTIVE
payroll.employee.not.active=Payroll cannot be generated for an inactive or terminated employee.

# Thrown when net salary calculation results in a negative value
payroll.net.salary.negative=Net salary cannot be negative. Check bonus and deductions values.

# Thrown when attempting an invalid payroll status transition (e.g., approve a PAID payroll)
payroll.approve.invalid.status=Cannot approve payroll with current status: {0}. Only GENERATED payrolls can be approved.

# Thrown when attempting to mark as PAID a payroll that is not in APPROVED status
payroll.pay.invalid.status=Cannot mark payroll as PAID with current status: {0}. Only APPROVED payrolls can be paid.

# Thrown when attempting to cancel a PAID payroll
payroll.cancel.paid.not.allowed=Cannot cancel a PAID payroll. It represents a completed financial transaction.

# Thrown when attempting to cancel an already CANCELLED payroll
payroll.already.cancelled=Payroll is already cancelled.


