payroll.paid.success=Payroll marked as PAID successfully for ID: {0}.
payroll.cancelled.success=Payroll cancelled successfully for ID: {0}.
payroll.fetch.success=Payroll fetched successfully for ID: {0}.
payroll.fetch.all.success=All payrolls fetched successfully.
payroll.fetch.employee.success=Payrolls fetched successfully for employee ID: {0}.
payroll.fetch.month.year.success=Payrolls fetched successfully for month {0} and year {1}.


