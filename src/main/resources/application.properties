spring.application.name=Payroll-Management-System

server.port=8080

#DB configuration 
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payroll-management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

#Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
#springdoc.swagger-ui.path=/
logging.file.name=src/main/resources/static/logs/project.logs
spring.data.web.pageable.one-indexed-parameters=true

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dymg3tgsw}
cloudinary.api-key=${CLOUDINARY_API_KEY:623719717568191}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:DxDkaVJwTx-qCfnsQAu9joqrXng}

# Task Scheduling Configuration
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=epms-sched-

# Cron Schedules (1: Daily Absentee at 23:59, 2: Monthly Payroll at 00:00 on 1st, 3: Monthly Payment at 00:00 on 5th)
app.cron.attendance-marker=0 59 23 * * *
app.cron.payroll-generation=0 0 0 1 * *
app.cron.payroll-payment=0 0 0 5 * *

# Salary Slip Storage (relative to app working dir or absolute path)
app.salary-slip.storage-dir=salary-slips

# Generate payroll for all active employees on startup (skips existing records)
app.payroll.seed-on-startup=true

# Support reverse proxy/load balancer forwarded headers (X-Forwarded-Host, X-Forwarded-Port, X-Forwarded-Proto)
server.forward-headers-strategy=framework